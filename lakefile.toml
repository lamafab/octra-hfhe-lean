name = "octra-hfhe"
defaultTargets = ["Octra"]

[leanOptions]
autoImplicit = false
relaxedAutoImplicit = false

[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4.git"
rev = "v4.30.0-rc1"

[[lean_lib]]
name = "Octra"          # root: Octra.lean, which imports every Octra.* module

[[lean_lib]]
name = "Examples"
globs = ["Examples.+"]
